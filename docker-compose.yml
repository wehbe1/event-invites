services:
  postgres:
    image: postgres:16-alpine
    container_name: event-invites-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: event_invites
    ports:
      - "5432:5432"
    volumes:
      - event_invites_pg:/var/lib/postgresql/data

volumes:
  event_invites_pg:
